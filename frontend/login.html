<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нэвтрэх | Learning System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="form-panel">
            <div class="top-link">
                <a href="index.html">
                    <i class="bi bi-arrow-left me-1"></i>Нүүр хуудас руу буцах
                </a>
            </div>

            <h3>Системд нэвтрэх</h3>
            <p class="subtitle">Эрхийн төрлөө сонгоод нэвтэрнэ үү.</p>

            <!-- Role selector -->
            <div class="role-selector" role="group">
                <button type="button" class="role-btn active-admin" id="btnAdmin" onclick="selectRole('admin')">
                    <div class="role-icon"><i class="bi bi-shield-lock-fill"></i></div>
                    <div class="role-label">
                        Админ
                        <small>Удирдлагын эрх</small>
                    </div>
                </button>
                <button type="button" class="role-btn" id="btnUser" onclick="selectRole('user')">
                    <div class="role-icon"><i class="bi bi-person-fill"></i></div>
                    <div class="role-label">
                        Хэрэглэгч
                        <small>Үзэх эрх</small>
                    </div>
                </button>
            </div>

            <div class="error-alert" id="loginError">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span id="loginErrorText">Нэвтрэх нэр эсвэл нууц үг буруу байна.</span>
            </div>

            <form id="loginForm" autocomplete="on" novalidate>
                <div class="mb-3">
                    <label class="form-label" for="username">Нэвтрэх нэр</label>
                    <div class="field-wrap">
                        <span class="field-icon"><i class="bi bi-person"></i></span>
                        <input type="text" id="username" name="username"
                               autocomplete="username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="password">Нууц үг</label>
                    <div class="field-wrap">
                        <span class="field-icon"><i class="bi bi-lock"></i></span>
                        <input type="password" id="password" name="password"
                               autocomplete="current-password" required>
                        <button type="button" class="btn-toggle-pw" onclick="togglePassword()">
                            <i class="bi bi-eye" id="pwToggleIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Нэвтрэх
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script src="login.js"></script>
</body>
</html>
